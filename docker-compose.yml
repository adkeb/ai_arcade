services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_arcade
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_arcade"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/game-assets local/game-artifacts local/game-covers || true
        mc anonymous set download local/game-assets
        mc anonymous set download local/game-artifacts
        mc anonymous set download local/game-covers

  web:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_arcade
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: docker-compose-demo-secret-change-me
      APP_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9002
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ASSETS_BUCKET: game-assets
      S3_ARTIFACTS_BUCKET: game-artifacts
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://llm-fqmv3nbrmalei7ti.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://llm-fqmv3nbrmalei7ti.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen3.7-plus}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen3.7-plus}
      OPENAI_ENABLE_THINKING: ${OPENAI_ENABLE_THINKING:-true}
      DASHSCOPE_ENABLE_THINKING: ${DASHSCOPE_ENABLE_THINKING:-true}
      OPENAI_JSON_RESPONSE_FORMAT: ${OPENAI_JSON_RESPONSE_FORMAT:-true}
      USE_LOCAL_AGENT_FALLBACK: ${USE_LOCAL_AGENT_FALLBACK:-false}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      DOCMIND_ACCESS_KEY_ID: ${DOCMIND_ACCESS_KEY_ID:-}
      DOCMIND_ACCESS_KEY_SECRET: ${DOCMIND_ACCESS_KEY_SECRET:-}
      DOCMIND_ENABLED: ${DOCMIND_ENABLED:-true}
      DOCMIND_ENDPOINT: ${DOCMIND_ENDPOINT:-docmind-api.cn-hangzhou.aliyuncs.com}
      DOCMIND_REGION_ID: ${DOCMIND_REGION_ID:-cn-hangzhou}
      DOCMIND_LLM_ENHANCEMENT: ${DOCMIND_LLM_ENHANCEMENT:-true}
      DOCMIND_ENHANCEMENT_MODE: ${DOCMIND_ENHANCEMENT_MODE:-VLM}
      DOCMIND_POLL_ATTEMPTS: ${DOCMIND_POLL_ATTEMPTS:-18}
      DOCMIND_POLL_INTERVAL_MS: ${DOCMIND_POLL_INTERVAL_MS:-2000}
      MAX_UPLOAD_MB: "20"
      JOB_TIMEOUT_SECONDS: "120"
    ports:
      - "3000:3000"
    command: /bin/sh -c "pnpm db:deploy && pnpm db:seed && pnpm --filter @ai-arcade/web dev --hostname 0.0.0.0"

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_arcade
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: docker-compose-demo-secret-change-me
      APP_URL: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9002
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ASSETS_BUCKET: game-assets
      S3_ARTIFACTS_BUCKET: game-artifacts
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://llm-fqmv3nbrmalei7ti.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://llm-fqmv3nbrmalei7ti.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen3.7-plus}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen3.7-plus}
      OPENAI_ENABLE_THINKING: ${OPENAI_ENABLE_THINKING:-true}
      DASHSCOPE_ENABLE_THINKING: ${DASHSCOPE_ENABLE_THINKING:-true}
      OPENAI_JSON_RESPONSE_FORMAT: ${OPENAI_JSON_RESPONSE_FORMAT:-true}
      USE_LOCAL_AGENT_FALLBACK: ${USE_LOCAL_AGENT_FALLBACK:-false}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      DOCMIND_ACCESS_KEY_ID: ${DOCMIND_ACCESS_KEY_ID:-}
      DOCMIND_ACCESS_KEY_SECRET: ${DOCMIND_ACCESS_KEY_SECRET:-}
      DOCMIND_ENABLED: ${DOCMIND_ENABLED:-true}
      DOCMIND_ENDPOINT: ${DOCMIND_ENDPOINT:-docmind-api.cn-hangzhou.aliyuncs.com}
      DOCMIND_REGION_ID: ${DOCMIND_REGION_ID:-cn-hangzhou}
      DOCMIND_LLM_ENHANCEMENT: ${DOCMIND_LLM_ENHANCEMENT:-true}
      DOCMIND_ENHANCEMENT_MODE: ${DOCMIND_ENHANCEMENT_MODE:-VLM}
      DOCMIND_POLL_ATTEMPTS: ${DOCMIND_POLL_ATTEMPTS:-18}
      DOCMIND_POLL_INTERVAL_MS: ${DOCMIND_POLL_INTERVAL_MS:-2000}
      MAX_UPLOAD_MB: "20"
      JOB_TIMEOUT_SECONDS: "120"
    command: pnpm --filter @ai-arcade/worker dev

volumes:
  postgres-data:
  minio-data:
